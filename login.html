<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIMPER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center p-6" style="background-image: radial-gradient(circle at 20% 30%, #1e293b 0%, #0f172a 100%);">
    
    <div class="glass p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-700/50">
        <div class="text-center mb-10">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/50 animate-bounce-slow">
                <i class="fas fa-microchip text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">SIMPER</h1>
            <p class="text-slate-500 text-xs mt-2 leading-relaxed">Sistem Informasi Perilaku Manajerial & Dukungan Keputusan</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Akses Pengguna</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-blue-500 transition-colors">
                        <i class="fas fa-user-circle"></i>
                    </span>
                    <input type="text" id="username" required class="block w-full pl-11 pr-4 py-3.5 border border-slate-200 rounded-2xl bg-slate-50/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" placeholder="Username/Email">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Kata Sandi</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-blue-500 transition-colors">
                        <i class="fas fa-shield-alt"></i>
                    </span>
                    <input type="password" id="password" required class="block w-full pl-11 pr-4 py-3.5 border border-slate-200 rounded-2xl bg-slate-50/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-500/30 transition-all transform hover:-translate-y-1 active:scale-95">
                Masuk Dashboard <i class="fas fa-arrow-right ml-2 text-sm"></i>
            </button>
        </form>

        <p class="text-center text-slate-400 text-[10px] mt-10 uppercase tracking-widest font-bold">
            &copy; 2026 Model Matematis v2.0
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
